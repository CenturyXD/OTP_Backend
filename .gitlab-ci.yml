image: docker:latest

stages:
  - build
  - test
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_DRIVER: overlay2

services:
  - docker:dind

before_script:
  - docker info

build:
  stage: build
  script:
    - docker-compose build

test:
  stage: test
  script:
    - echo "$BACKEND_ENV" > backend/.env
    - cat backend/.env
    - docker-compose run --rm backend composer install --no-interaction --prefer-dist --optimize-autoloader
    - docker-compose run --rm backend php artisan test
    - docker-compose run --rm frontend npm install
    - docker-compose run --rm frontend npm test -- --watchAll=false

deploy:
  stage: deploy
  script:
    - docker-compose up -d
  when: on_success