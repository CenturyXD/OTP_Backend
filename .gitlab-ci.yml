stages:
  - build
  - test
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_DRIVER: overlay2

services:
  - docker:dind

before_script:
  - docker info

build:
  stage: build
  script:
    - docker-compose build

test:
  stage: test
  script:
    # ตัวอย่าง: รัน unit test ของ backend (Laravel)
    - docker-compose run --rm backend php artisan test
    # ตัวอย่าง: รัน unit test ของ frontend (React)
    - docker-compose run --rm frontend npm test -- --watchAll=false

deploy:
  stage: deploy
  script:
    - docker-compose up -d
  when: on_success