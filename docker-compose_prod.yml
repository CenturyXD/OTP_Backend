version: '3.8'

services:
  # Backend Service (Laravel + PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-laravel-backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    networks:
      - my_app_network
    depends_on:
      - db
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

  # Frontend Service (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my-react-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules # ป้องกันไม่ให้ node_modules ใน container ถูกเขียนทับ
    ports:
      - "5173:5173" # สำหรับ Vite Dev Server (Hot Reload)
    networks:
      - my_app_network

  # Nginx Service (Reverse Proxy)
  nginx:
    image: nginx:1.25-alpine
    container_name: my-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/html # Mount backend code for serving static files
    networks:
      - my_app_network
    depends_on:
      - backend
      - frontend

  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: my-postgres-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    networks:
      - my_app_network

networks:
  my_app_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local