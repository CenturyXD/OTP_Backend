frontend pgsql_front
    bind *:5435
    mode tcp
    option tcplog
    default_backend pgsql_back

backend pgsql_back
    mode tcp
    option tcp-check
    timeout connect 5s
    timeout server 30s
    server master postgres_master:5432 check inter 2s fall 3 rise 2
    server replica postgres_replica:5432 check backup inter 2s fall 3 rise 2


