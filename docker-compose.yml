version: '3.8'

services:
  db_master:
    build:
      context: ./bitnami/master
    container_name: postgres_master
    restart: on-failure
    ports:
      - "5434:5432"
    volumes:
      - db_master_data:/bitnami/postgresql
    networks:
      - my_app_network

  db_replica:
    build:
      context: ./bitnami/replica
    container_name: postgres_replica
    restart: on-failure
    ports:
      - "5433:5432"
    depends_on:
      - db_master
    volumes:
      - db_replica_data:/bitnami/postgresql
    networks:
      - my_app_network

  haproxy:
    image: haproxy:latest
    container_name: haproxy
    restart: unless-stopped
    ports:
      - "5435:5432"
    depends_on:
      - db_master
      - db_replica
    networks:
      - my_app_network
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-laravel-backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    networks:
      - my_app_network
    depends_on:
      - haproxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my-react-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - my_app_network

  nginx:
    image: nginx:1.25-alpine
    container_name: my-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/app/dist
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/html
    networks:
      - my_app_network
    depends_on:
      - backend
      - frontend

networks:
  my_app_network:
    driver: bridge

volumes:
  db_master_data:
  db_replica_data: