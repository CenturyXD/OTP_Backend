server {
    listen 80;
    server_name localhost;

    # === Frontend (React App) ===
    location / {
        root /app/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # === Backend (Laravel API) ===
    location /api {
        # เปลี่ยน location /api ทั้งหมดเป็นแบบนี้
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/index\.php(/|$) {
        # กำหนด root ไปที่ public directory ของ Laravel
        root /var/www/html/public;
        
        # ส่งคำขอไปให้ PHP-FPM service
        fastcgi_pass my-laravel-backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        
        # บอก PHP-FPM ว่าให้รันไฟล์ไหน
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # จัดการกับ Error pages
    error_page 404 /index.html;

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}