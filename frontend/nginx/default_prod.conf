upstream backend {
    server laravel_app:8000;
}
server {
    listen 80;
    server_name ipcloud.ntplc.cloud;
    return 301 https://$host$request_uri;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name ipcloud.ntplc.cloud;

    ssl_certificate /etc/letsencrypt/live/ipcloud.ntplc.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ipcloud.ntplc.cloud/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}